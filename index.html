<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  > <!-- displays site properly based on user's device -->
  <link
    rel="icon"
    type="image/png"
    sizes="32x32"
    href="./assets/images/favicon-32x32.png"
  >
  <title>Frontend Mentor | Social links profile</title>
</head>
<body>

<main class="content">
  <article class="social-card">
    <div class="social-card__wrapper-image">
      <img
        class="social-card__avatar"
        src="./assets/images/avatar-jessica.jpeg"
        alt="Jessica Randall"
        width="176"
        height="176"
      />
    </div>
    <div class="social-card__info">
      <h1 class="social-card__name">Jessica Randall</h1>
      <p class="social-card__location">London, United Kingdom</p>
    </div>
    <p class="social-card__work">"Front-end developer and avid reader."</p>
    <ul class="social-card__list">
      <li class="social-card__item">
        <a
          class="social-card__link"
          href=""
          rel="noopener noreferrer"
          target="_blank"
        >
          GitHub
        </a>
      </li>
      <li class="social-card__item">
        <a
          class="social-card__link"
          href=""
          rel="noopener noreferrer"
          target="_blank"
        >
          Frontend Mentor
        </a>
      </li>
      <li class="social-card__item">
        <a
          class="social-card__link"
          href=""
          rel="noopener noreferrer"
          target="_blank"
        >
          LinkedIn
        </a>
      </li>
      <li class="social-card__item">
        <a
          class="social-card__link"
          href=""
          rel="noopener noreferrer"
          target="_blank"
        >
          Twitter
        </a>
      </li>
      <li class="social-card__item">
        <a
          class="social-card__link"
          href=""
          rel="noopener noreferrer"
          target="_blank"
        >
          Instagram
        </a>
      </li>
    </ul>
  </article>
</main>
</body>
</html>
